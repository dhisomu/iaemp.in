version: '3.8'

services:
  iaemp-frontend:
    image: nginx:alpine
    container_name: iaemp-frontend-demo
    restart: always
    volumes:
      - ./www/Home:/usr/share/nginx/html
      - ./conf/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8081:80"
    networks:
      - xify-network

networks:
  xify-network:
    external: true
